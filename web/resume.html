<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>resume editor — job_searcher_web</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
  body { font: 14px/1.5 system-ui, sans-serif; max-width: 760px; margin: 1.5rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 20px; margin: 0 0 .25rem; }
  .sub { color: #666; font-size: 12px; margin-bottom: 1rem; }
  button { padding: .35rem .7rem; background: #1a4ed8; color: #fff; border: 0; border-radius: 4px; cursor: pointer; font-size: 13px; }
  button:hover { background: #1340b5; }
  button.small { padding: .2rem .5rem; font-size: 12px; }
  button.secondary { background: #b00020; }
  button.secondary:hover { background: #8a0019; }
  textarea { width: 100%; box-sizing: border-box; padding: .4rem .55rem; border: 1px solid #ccc; border-radius: 4px; font: inherit; resize: vertical; }

  .resume-editor { border: 1px solid #e3e3e3; border-radius: 6px; padding: 1rem 1.25rem; background: #fff; }
  .re-header h2 { margin: 0; font-size: 17px; }
  .re-sub { color: #888; font-size: 12px; }
  .re-role { margin-top: 1.25rem; }
  .re-role h3 { margin: 0 0 .5rem; font-size: 14px; }
  .re-company { color: #555; font-weight: 400; }
  .re-dates { color: #999; font-weight: 400; font-size: 12px; }
  .re-bullets { display: flex; flex-direction: column; gap: .5rem; }
  .re-bullet { border: 1px solid #eee; border-radius: 5px; padding: .5rem .6rem; background: #fafafa; }
  .re-actions { display: flex; gap: .4rem; align-items: center; margin-top: .35rem; }
  .re-id { color: #bbb; font-size: 11px; font-family: ui-monospace, Menlo, monospace; margin-left: auto; }
  .re-add { margin-top: .6rem; padding-top: .6rem; border-top: 1px dashed #ddd; }
  .re-add button { margin-top: .35rem; }
  .htmx-request.re-bullet, .htmx-request.re-add { opacity: .6; }
</style>
</head>
<body>
  <h1>resume editor</h1>
  <div class="sub">Left-hand canonical editor (slice 2). Edits write straight to <code>web.resume_bullets</code>.</div>
  <div hx-get="/ui/resume?profile=Slava" hx-trigger="load" hx-swap="innerHTML">
    <p style="color:#999">loading resume…</p>
  </div>
</body>
</html>
